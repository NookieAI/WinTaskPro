# ─────────────────────────────────────────────────────────────────────────────
# WinTaskPro — GitHub Actions Release Workflow
#
# Triggered on: push of a version tag (v*)
#   git tag v1.15.0 && git push origin v1.15.0
#
# Produces (the ONLY release asset):
#   • WinTaskPro.exe   (single-file portable exe — auto-update target)
#
# Installer bundling (NSIS / MSI) was intentionally REMOVED — the project ships
# only the single portable exe (bundle is also disabled in tauri.conf.json).
#
# This workflow does NOT publish a signed updater manifest. The update flow
# shipped in 1.8.0 is "in-place self-replace" — see UPDATER.md for the
# upgrade path to plugin-updater (requires generating an Ed25519 keypair
# and adding TAURI_SIGNING_PRIVATE_KEY as a secret).
#
# Optional code signing (suppresses SmartScreen):
#   WINDOWS_CERTIFICATE_THUMBPRINT  set in repo Secrets, uncomment line below
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    name: Build & Publish (Windows x64)
    runs-on: windows-latest
    permissions:
      contents: write   # needed to create GitHub Release

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Toolchain ────────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Rust (stable MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ── Install dependencies ──────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── Pre-build quality gates ──────────────────────────────────────────
      # Fast-fail on cheap checks before the 2-3 min Rust build starts.
      # A frontend syntax error caught here saves several minutes per attempt
      # vs surfacing only after the cargo compile completes.
      - name: Verify frontend JS syntax (node --check)
        run: node --check src/app.js

      # Cargo.lock drift check — informational only (continue-on-error: true)
      # until the lockfile is refreshed to match the current Cargo.toml pins.
      # See the [Unreleased] entry in CHANGELOG.md for the one-time fix.
      # Once the lockfile is in sync, drop continue-on-error so drift fails CI.
      - name: Check Cargo.lock is in sync (informational)
        continue-on-error: true
        shell: pwsh
        run: |
          cd src-tauri
          cargo metadata --locked --format-version=1 --offline > $null 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "Cargo.lock is out of sync with Cargo.toml. Run: cd src-tauri; cargo update"
            Write-Warning "The build will still succeed but Cargo.lock will be silently rewritten."
          } else {
            Write-Host "Cargo.lock is in sync with Cargo.toml."
          }

      # ── Build the portable EXE (the ONLY release artefact) ──────────────
      # `tauri build --no-bundle` produces just the raw WinTaskPro.exe — no
      # NSIS/MSI installers. The release itself is created in the final step
      # below (softprops/action-gh-release), with only this exe attached.
      - name: Build portable exe
        run: npm run build:portable

      # ── Locate + rename portable artefact ───────────────────────────────
      # The asset MUST be named exactly `WinTaskPro.exe` so the in-app
      # auto-updater's URL pattern works:
      #   https://github.com/NookieAI/WinTaskPro/releases/latest/download/WinTaskPro.exe
      # The version is encoded in the GitHub release tag, not the filename.
      #
      # 1.14.2: Cargo.toml [[bin]] name = "WinTaskPro" so the raw build
      # output is now WinTaskPro.exe directly. We still check the legacy
      # lowercase path as a fallback so a stale build from before the rename
      # doesn't break the workflow.
      - name: Stage portable artefact
        id: portable
        shell: pwsh
        run: |
          $candidates = @(
            "src-tauri/target/release/WinTaskPro.exe",
            "src-tauri/target/release/wintaskpro.exe"   # legacy fallback
          )
          $src = $null
          foreach ($c in $candidates) {
            if (Test-Path $c) { $src = $c; break }
          }
          if (-not $src) {
            Write-Error "Portable build output missing — looked in: $($candidates -join ', ')"
            exit 1
          }
          $dst = "WinTaskPro.exe"
          # Always copy to the workspace root so the upload-asset step finds it
          # at a stable, predictable path regardless of where Cargo placed it.
          Copy-Item $src $dst -Force
          $hash = (Get-FileHash $dst -Algorithm SHA256).Hash
          $size = (Get-Item $dst).Length
          Write-Host "Portable artefact: $dst ($size bytes)"
          Write-Host "Source path:       $src"
          Write-Host "SHA-256:           $hash"
          # Sanity check: refuse to upload anything wildly larger than expected
          if ($size -gt 200MB) {
            Write-Error "Portable .exe is suspiciously large ($size bytes); refusing to upload"
            exit 1
          }
          if ($size -lt 1MB) {
            Write-Error "Portable .exe is suspiciously small ($size bytes); refusing to upload"
            exit 1
          }
          "path=$dst"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "sha256=$hash"  | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "size=$size"    | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # ── Create the GitHub Release with ONLY WinTaskPro.exe ──────────────
      # softprops/action-gh-release creates the release (if absent) and uploads
      # the single portable exe as the sole asset — no installers.
      - name: Create release (WinTaskPro.exe only)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'WinTaskPro ${{ github.ref_name }}'
          body: |
            ## What's new

            See [CHANGELOG.md](https://github.com/NookieAI/WinTaskPro/blob/main/CHANGELOG.md) for the full list of changes.

            ## Download

            **`WinTaskPro.exe`** — single-file portable. Run from anywhere; no install. This is also what the in-app auto-updater downloads.

            ## Auto-update

            Existing 1.8.0+ installs check GitHub on each launch. When a new release is published, click **🔄 Update Now** in the in-app banner to download `WinTaskPro.exe`, replace the running exe in place, and re-launch.

            ## Requirements

            - Windows 10 21H1 or later (64-bit)
            - WebView2 Runtime (pre-installed on Windows 10 21H1+ and Windows 11)
            - Run as Administrator (required for Task Scheduler access)
          draft: false
          prerelease: false
          files: ${{ steps.portable.outputs.path }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Verify the canonical asset URL works ─────────────────────────────
      # Belt and braces: GitHub takes ~30 s to propagate "latest" pointers
      # after a release is created. We poll the redirect target so the run
      # log shows the public URL the auto-updater will hit.
      - name: Verify auto-update URL
        shell: pwsh
        continue-on-error: true   # don't fail the release if propagation is slow
        run: |
          $tag = "${{ github.ref_name }}"
          $tagged = "https://github.com/NookieAI/WinTaskPro/releases/download/$tag/WinTaskPro.exe"
          $latest = "https://github.com/NookieAI/WinTaskPro/releases/latest/download/WinTaskPro.exe"
          Write-Host "Tagged URL:  $tagged"
          Write-Host "Latest URL:  $latest"
          # Wait up to 60 s for "latest" pointer to update
          for ($i = 0; $i -lt 12; $i++) {
            try {
              $r = Invoke-WebRequest -Uri $latest -Method Head -UseBasicParsing -ErrorAction Stop
              Write-Host "Latest URL responded $($r.StatusCode) on attempt $($i + 1)"
              break
            } catch {
              Write-Host "Attempt $($i + 1): not yet propagated — $($_.Exception.Message)"
              Start-Sleep -Seconds 5
            }
          }
